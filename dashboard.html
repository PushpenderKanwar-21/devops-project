 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CloudOps Monitoring</title>



<style>
body {
    margin: 0;
    font-family: monospace;
    background: black;
    color: #00ffcc;
}

/* TITLE */
h1 {
    text-align: center;
    margin-top: 20px;
    text-shadow: 0 0 10px #00ffcc;
}

/* SYSTEM CARDS */
#systems {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    margin: 30px;
}

/* CARD */
.card {
    border: 2px solid #00ffcc;
    padding: 15px;
    border-radius: 10px;
    width: 220px;
    background: rgba(0,0,0,0.8);
    box-shadow: 0 0 15px #00ffcc;
}


</style>
</head>

<body>

<h1>⚡ CLOUDOPS REAL-TIME MONITORING ⚡</h1>

<div id="systems"></div>


<script>
console.log("JS RUNNING ✅");

const API_URL = "https://edge-monitor-server.onrender.com/systems";

async function load() {
    try {
        const container = document.getElementById("systems");

        // 1. SHOW LOADING
        container.innerHTML = "<p style='text-align:center'>⏳ Server waking up... please wait</p>";

        // 2. FETCH DATA
        const res = await fetch(API_URL, { cache: "no-store" });

        // handle bad response (like 502)
        if (!res.ok) {
            throw new Error("Server error: " + res.status);
        }

        const data = await res.json();

        // 3. RETRY IF NO DATA
        if (!data || data.length === 0) {
            setTimeout(load, 2000);
            return;
        }

        // 4. CLEAR LOADING
        container.innerHTML = "";

        // 5. RENDER CARDS
        data.forEach(sys => {

            const now = new Date();
            const last = new Date(sys.lastUpdated);
            const diff = (now - last) / 1000;

            let status = diff > 10 ? "🔴 OFFLINE" : "🟢 ONLINE";

            const div = document.createElement("div");
            div.className = "card";

            let role = "Unknown";

            if (sys.systemName.includes("DevNode")) role = "Development";
            else if (sys.systemName.toLowerCase().includes("edge")) role = "Client Edge";
            else if (sys.systemName.toLowerCase().includes("prod")) role = "Production Server";
            else if (sys.systemName.toLowerCase().includes("api")) role = "API Gateway";
            else if (sys.systemName.toLowerCase().includes("analytics")) role = "Analytics Engine";

            div.innerHTML = `
                <h3>${sys.systemName}</h3>
                <p>Role: ${role}</p>
                <p>CPU: ${sys.cpu || 0}%</p>
                <p>Memory: ${sys.memory || 0}%</p>
                <p>Disk: ${sys.disk || 0}%</p>
                <p>Network: ${sys.network || 0}%</p>
                <p>Uptime: ${sys.uptime || 0} mins</p>
                <p>Status: ${status}</p>
            `;

            container.appendChild(div);
        });

    } catch (err) {
        console.log("ERROR:", err);

        const container = document.getElementById("systems");

        // ERROR UI
        container.innerHTML = "<p style='text-align:center; color:red;'>⚠️ Server error. Retrying...</p>";

        setTimeout(load, 5000);
    }
}

// AUTO RUN + REFRESH
window.onload = () => {
    load();
        
};
</script>

</body>
</html>
