 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CloudOps Monitoring</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: monospace;
    background: black;
    color: #00ffcc;
    overflow-x: hidden;
}

/* Matrix style background */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(
        0deg,
        rgba(0,255,0,0.1),
        rgba(0,255,0,0.1) 1px,
        transparent 1px,
        transparent 20px
    );
    z-index: -1;
}

/* Title */
h1 {
    text-align: center;
    margin-top: 20px;
    text-shadow: 0 0 10px #00ffcc;
}

/* Cards container */
#systems {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    margin: 30px;
}

/* Card style */
.card {
    border: 2px solid #00ffcc;
    padding: 15px;
    border-radius: 10px;
    width: 220px;
    background: rgba(0,0,0,0.8);
    box-shadow: 0 0 15px #00ffcc;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

/* Chart */
.chart-container {
    width: 80%;
    margin: auto;
}
</style>
</head>

<body>

<h1>⚡ CLOUDOPS REAL-TIME MONITORING ⚡</h1>

<div id="systems"></div>

<div class="chart-container">
    <canvas id="chart"></canvas>
</div>

<script>
const API_URL = "https://edge-monitor-server.onrender.com/systems";

let chart;

function initChart() {
    const ctx = document.getElementById("chart");

    chart = new Chart(ctx, {
        type: "line",
        data: {
            labels: [],
           datasets: [
    {
        label: "Your System",
        data: [],
        borderColor: "#00ffcc",
        backgroundColor: "rgba(0,255,200,0.1)",
        tension: 0.4
    },
    {
        label: "Friend System",
        data: [],
        borderColor: "#0099ff",
        backgroundColor: "rgba(0,153,255,0.1)",
        tension: 0.4
    }
]
        },
        options: {
            plugins: {
                legend: { display: false }
            },
            scales: {
                x: { ticks: { color: "#0f0" } },
                y: { ticks: { color: "#0f0" } }
            }
        }
    });
}

async function load() {
    const res = await fetch(API_URL);
    const data = await res.json();
    console.log(data);

    const container = document.getElementById("systems");
    container.innerHTML = "";

    data.forEach(sys => {

        const now = new Date();
        const last = new Date(sys.lastUpdated);
        const diff = (now - last) / 1000;

        let status = diff > 10 ? "🔴 OFFLINE" : "🟢 ONLINE";

        const div = document.createElement("div");
        div.className = "card";

      div.innerHTML = `
    <h3>${sys.systemName}</h3>

    <p>CPU: ${sys.cpu}%</p>
    <p>Memory: ${sys.memory}%</p>
    <p>Disk: ${sys.disk}%</p>

    <p>🌐 Network: ${sys.network || 0}%</p>
    <p>⏱️ Uptime: ${sys.uptime ? Math.floor(sys.uptime / 60) : 0} mins</p>

    <p>Status: ${status}</p>
`;
        container.appendChild(div);

        // graph update
        // keep only last 20 points
if (chart.data.labels.length > 20) {
    chart.data.labels.shift();
    chart.data.datasets[0].data.shift();
}

chart.data.labels.push("");


    chart.update();
}

initChart();
load();

setInterval(load, 3000);
</script>

</body>
</html>
